name: AI Eval Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ai-eval:
    runs-on: ubuntu-latest
    name: AI Validation Pipeline

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run eval harness (deterministic, no network)
        run: npm run eval > ../ai-eval-report.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-eval-report
          path: ai-eval-report.json
          retention-days: 30
